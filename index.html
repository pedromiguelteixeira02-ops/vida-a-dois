<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agenda Filarmónica</title>
<style>
:root{
  --bg:#f0f4f8;--card:#fff;--text:#1a202c;--text2:#718096;--text3:#a0aec0;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.18);
  --primary:#185FA5;--pbg:#E6F1FB;
  --success:#0a6641;--sbg:#dcf5eb;
  --danger:#943515;--dbg:#fae9e3;
  --warn:#7a4600;--wbg:#faeeda;
  --r:8px;--rl:12px;--shadow:0 1px 4px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:.5px solid var(--border)}
.header-top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px 8px}
.header-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--text)}
.export-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border:.5px solid var(--border2);border-radius:var(--r);background:none;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.export-btn:hover{background:var(--bg)}

/* TABS */
.tabs{display:flex;border-top:.5px solid var(--border)}
.tab-btn{flex:1;padding:7px 4px 6px;border:none;border-bottom:2px solid transparent;background:none;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;transition:color .15s,border-color .15s}
.tab-btn .icon{font-size:17px}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--card);border-bottom:.5px solid var(--border)}
.month-name h2{font-size:14px;font-weight:700;color:var(--text);text-align:center}
.month-name p{font-size:11px;color:var(--text2);text-align:center;margin-top:1px}
.nav-btn{padding:5px 13px;border:.5px solid var(--border2);border-radius:var(--r);background:none;color:var(--text2);font-size:16px;cursor:pointer;font-family:inherit}
.nav-btn:hover{background:var(--bg)}

/* CALENDAR */
.cal-wrap{background:#f7f9fc;padding:4px 5px 6px;border-bottom:.5px solid var(--border)}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px}
.cal-day-label{text-align:center;font-size:10px;font-weight:700;color:var(--text3);padding:3px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{background:var(--card);border-radius:6px;padding:3px;min-height:54px;cursor:pointer;border:.5px solid var(--border);transition:border-color .15s}
.cal-cell:hover{border-color:var(--border2)}
.cal-cell.today{border:2px solid var(--primary)}
.cal-cell.empty{background:transparent;border:none;cursor:default;min-height:0}
.cal-num{font-size:10px;font-weight:500;color:var(--text2);display:block;margin-bottom:1px}
.cal-cell.today .cal-num{color:var(--primary);font-weight:700}
.cal-event{font-size:8px;padding:1px 3px;border-radius:3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:700;display:block;cursor:pointer}
.cal-event:hover{opacity:.8}

/* CONTENT */
.content{padding:8px 8px 90px}
.card{background:var(--card);border-radius:var(--rl);border:.5px solid var(--border);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.card-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px}

/* STATS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-box{padding:8px 10px;border-radius:var(--r)}
.stat-box.blue{background:var(--pbg)}.stat-box.gray{background:var(--bg)}
.stat-label{font-size:10px;color:var(--text2);margin-bottom:2px;font-weight:600}
.stat-num{font-size:24px;font-weight:700}
.stat-box.blue .stat-num{color:var(--primary)}.stat-box.gray .stat-num{color:var(--text)}
.stat-row{display:flex;justify-content:space-between;align-items:center;border-top:.5px solid var(--border);padding-top:8px}
.total-val{font-size:18px;font-weight:700;color:var(--success)}
.grand-total{font-size:22px;font-weight:700;color:var(--success)}

/* EVENT ROWS */
.event-row{padding:8px 0;border-bottom:.5px solid var(--border);cursor:pointer}
.event-row:last-child{border-bottom:none}
.event-row:hover{opacity:.8}
.event-row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.event-name{font-size:12px;font-weight:700;color:var(--text)}
.date-badge{font-size:10px;font-weight:700;padding:1px 8px;border-radius:10px;flex-shrink:0}
.event-sub{font-size:10px;color:var(--text2)}
.event-money{font-size:11px;font-weight:700;color:var(--success)}
.band-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;margin-top:2px;display:inline-block}
.second-band{font-size:10px;color:#534AB7;margin-top:2px;font-style:italic}
.future-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:.5px solid var(--border);cursor:pointer}
.future-row:last-child{border-bottom:none}
.future-row:hover{opacity:.8}

/* ADD BUTTON */
.add-btn{width:100%;padding:9px;border:.5px dashed var(--border2);border-radius:var(--rl);background:none;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:4px;transition:background .15s}
.add-btn:hover{background:var(--card)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-box{background:var(--card);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:16px;max-height:88vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:700;color:var(--text)}
.close-btn{border:none;background:var(--bg);border-radius:var(--r);width:30px;height:30px;cursor:pointer;font-size:15px;color:var(--text2);font-family:inherit}
.close-btn:hover{background:var(--border)}

/* FORM */
.field{margin-bottom:8px}
.field label{font-size:11px;font-weight:700;color:var(--text2);display:block;margin-bottom:3px}
input,select,textarea{width:100%;padding:8px 10px;border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(24,95,165,.12)}
textarea{resize:none;line-height:1.5}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* BUTTONS */
.btn-row{display:flex;gap:8px;margin-top:8px}
.btn{flex:1;padding:9px 10px;border:none;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:filter .15s}
.btn:hover{filter:brightness(.95)}
.btn-primary{background:var(--pbg);color:var(--primary)}
.btn-danger{background:var(--dbg);color:var(--danger)}
.btn-secondary{background:var(--bg);color:var(--text2);border:.5px solid var(--border2)}

/* EMPTY */
.empty-state{text-align:center;padding:32px 16px;color:var(--text2);font-size:12px;line-height:1.7}
.empty-icon{font-size:36px;margin-bottom:10px}

/* GROUPS */
.code-display{font-family:monospace;font-weight:900;font-size:22px;color:var(--primary);letter-spacing:4px;text-align:center;background:var(--pbg);border-radius:var(--r);padding:10px;margin:8px 0;border:.5px dashed rgba(24,95,165,.3);cursor:pointer;user-select:all}
.group-tip{background:var(--bg);border-radius:var(--r);padding:8px 10px;font-size:11px;color:var(--text2);line-height:1.5}
.poll-card{background:var(--card);border-radius:var(--rl);border:.5px solid var(--border);padding:10px 12px;margin-bottom:6px;box-shadow:var(--shadow)}
.poll-card.past{opacity:.5}
.poll-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.tally{display:flex;gap:12px;font-size:11px;font-weight:700;margin:5px 0}
.t-sim{color:var(--success)}.t-nao{color:var(--danger)}.t-tal{color:var(--warn)}
.vote-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:6px}
.vote-btn{padding:6px 2px;border-radius:var(--r);font-size:10px;font-weight:700;cursor:pointer;border:.5px solid var(--border);background:var(--bg);color:var(--text2);font-family:inherit;transition:all .15s}
.vote-btn.s-sim{background:var(--sbg);color:var(--success);border-color:var(--success)}
.vote-btn.s-nao{background:var(--dbg);color:var(--danger);border-color:var(--danger)}
.vote-btn.s-tal{background:var(--wbg);color:var(--warn);border-color:var(--warn)}
.member-votes{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.member-tag{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:700}
.setup-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.leave-btn{border:.5px solid var(--border2);border-radius:var(--r);background:none;padding:7px 20px;cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit;font-weight:600}
.leave-btn:hover{background:var(--dbg);color:var(--danger);border-color:var(--danger)}
.setup-panel{margin-top:12px}
.copy-notice{text-align:center;font-size:10px;color:var(--text3);margin-top:3px}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="header-title">🎼 Agenda Filarmónica</div>
      <button class="export-btn" onclick="exportPDF()">📄 Exportar PDF</button>
    </div>
    <div class="tabs">
      <button class="tab-btn active" id="tab-btn-agenda" onclick="setTab('agenda')">
        <span class="icon">📅</span>Agenda
      </button>
      <button class="tab-btn" id="tab-btn-next" onclick="setTab('next')">
        <span class="icon">🕐</span>Próximos
      </button>
      <button class="tab-btn" id="tab-btn-groups" onclick="setTab('groups')">
        <span class="icon">👥</span>Grupos
      </button>
    </div>
  </div>

  <!-- AGENDA TAB -->
  <div id="tab-agenda">
    <div class="month-nav">
      <button class="nav-btn" onclick="prevMonth()">‹</button>
      <div class="month-name">
        <h2 id="monthTitle"></h2>
        <p id="yearDisplay"></p>
      </div>
      <button class="nav-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="cal-wrap">
      <div class="cal-days-header" id="calHeader"></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="content" id="statsContent"></div>
  </div>

  <!-- PRÓXIMOS TAB -->
  <div id="tab-next" style="display:none">
    <div class="content" id="nextContent"></div>
  </div>

  <!-- GRUPOS TAB -->
  <div id="tab-groups" style="display:none">
    <div class="content" id="groupsContent"></div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal" style="display:none" onclick="overlayClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Novo Evento</span>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>

      <div class="field">
        <label>Banda</label>
        <select id="fBand" onchange="handleBandChange()">
          <option>Sociedade Artística Banda de Vale de Cambra</option>
          <option>Banda Musical de Figueiredo</option>
          <option>Sociedade Musical de Fajões</option>
          <option>Outros</option>
        </select>
      </div>
      <div class="field" id="customBandField" style="display:none">
        <label>Nome da banda</label>
        <input id="fCustomBand" placeholder="Nome da banda">
      </div>
      <div class="field">
        <label>Tipo</label>
        <select id="fType">
          <option>Serviço</option>
          <option>Ensaio</option>
        </select>
      </div>
      <div class="field">
        <label>Nome do evento / festa</label>
        <input id="fName" placeholder="Ex: Santo António">
      </div>
      <div class="field">
        <label>Data</label>
        <input id="fDate" type="date">
      </div>
      <div class="row2">
        <div class="field">
          <label>Hora início</label>
          <input id="fStart" type="time">
        </div>
        <div class="field">
          <label>Hora fim</label>
          <input id="fEnd" type="time">
        </div>
      </div>
      <div class="field">
        <label>Localização</label>
        <input id="fLocation" placeholder="Ex: Vale de Cambra">
      </div>
      <div class="field">
        <label>Banda convidada (opcional)</label>
        <input id="fSecondBand" placeholder="Segunda banda">
      </div>
      <div class="field">
        <label>Valor recebido (€)</label>
        <input id="fValue" type="number" value="0" min="0" step="5">
      </div>
      <div class="field">
        <label>Notas</label>
        <textarea id="fNotes" rows="2" placeholder="Observações..."></textarea>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveEvent()">💾 Guardar</button>
        <button class="btn btn-danger" id="btnDelete" onclick="deleteEvent()" style="display:none">🗑 Apagar</button>
        <button class="btn btn-secondary" onclick="closeModal()">Fechar</button>
      </div>
    </div>
  </div>

</div><!-- /app -->

<script>
/* ════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════ */
const BANDS = [
  {name:'Sociedade Artística Banda de Vale de Cambra', short:'Vale de Cambra', bg:'#B5D4F4', fg:'#0C447C'},
  {name:'Banda Musical de Figueiredo',                 short:'Figueiredo',    bg:'#9FE1CB', fg:'#085041'},
  {name:'Sociedade Musical de Fajões',                 short:'Fajões',        bg:'#CECBF6', fg:'#3C3489'},
  {name:'Outros',                                      short:'Outros',        bg:'#F5C4B3', fg:'#712B13'},
];

const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_PT   = ['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];

const _td      = new Date();
const todayStr = isoDate(_td);

const SEED = [
  {id:'s01',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-01-25',start:'09:00',end:'20:00',location:'Tougues, Vila do Conde',              name:'Tougues',                          secondBand:'',                                              value:0,notes:''},
  {id:'s02',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-02-01',start:'14:00',end:'20:00',location:'Vila Chã, Vale de Cambra',             name:'Vila Chã',                         secondBand:'',                                              value:0,notes:''},
  {id:'s03',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-05-17',start:'09:00',end:'21:00',location:'Alvarães',                              name:'Festa das Cruzes',                 secondBand:'',                                              value:0,notes:''},
  {id:'s04',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-06-13',start:'14:00',end:'00:00',location:'Vale de Cambra',                        name:'Santo António',                    secondBand:'',                                              value:0,notes:''},
  {id:'s05',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-06-14',start:'08:00',end:'20:00',location:'Junqueira, Vila do Conde',              name:'Santíssimo Sacramento (Junqueira)',secondBand:'',                                              value:0,notes:''},
  {id:'s06',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-06-21',start:'14:00',end:'20:00',location:'Cristelo, Barcelos',                   name:'Santíssimo Sacramento (Cristelo)', secondBand:'',                                              value:0,notes:''},
  {id:'s07',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-06-23',start:'08:00',end:'01:00',location:'Braga',                                name:'São João de Braga',                secondBand:'Banda Velha de Barroselas, Banda de Vila Verde',value:0,notes:''},
  {id:'s08',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-06-28',start:'17:00',end:'19:00',location:'São Pedro de Castelões, Vale de Cambra',name:'São Pedro',                        secondBand:'',                                              value:0,notes:''},
  {id:'s09',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-07-05',start:'08:00',end:'00:00',location:'Travanca, Cinfães',                    name:'Santa Isabel',                     secondBand:'Banda de Mineiros de Pejão',                   value:0,notes:''},
  {id:'s10',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-07-11',start:'15:00',end:'00:00',location:'Rio Tinto',                            name:'São Bento de Peras',               secondBand:'Banda de Arcos de Valdevez',                   value:0,notes:''},
  {id:'s11',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-07-12',start:'08:30',end:'20:00',location:'Vila Viçosa, Arouca',                  name:'São Plágio',                       secondBand:'Banda Marcial do Vale',                        value:0,notes:''},
  {id:'s12',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-07-19',start:'14:00',end:'20:00',location:'São Pedro de Castelões, Vale de Cambra',name:'Nossa Sra do Carmo',               secondBand:'',                                              value:0,notes:''},
  {id:'s13',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-07-26',start:'08:30',end:'20:00',location:'Tougues, Vila do Conde',               name:'Nossa Sra do Padrão',              secondBand:'Banda de Arcos de Valdevez',                   value:0,notes:''},
  {id:'s14',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-08-02',start:'08:30',end:'20:00',location:'Vila Nova de Cerveira',                name:'Festas do Concelho',               secondBand:'',                                              value:0,notes:''},
  {id:'s15',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-08-09',start:'08:00',end:'20:00',location:'Valdigem, Lamego',                     name:'Nossa Sra de Fátima',              secondBand:'',                                              value:0,notes:''},
  {id:'s16',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-09-08',start:'09:00',end:'00:00',location:'Macieira de Cambra, Vale de Cambra',   name:'Setembrinas',                      secondBand:'Flor da Mocidade Junqueirense',                value:0,notes:''},
  {id:'s17',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-11-14',start:'14:00',end:'20:00',location:'Vale de Cambra',                        name:'Concerto de Aniversário',          secondBand:'',                                              value:0,notes:''},
  {id:'s18',band:'Sociedade Artística Banda de Vale de Cambra',type:'Serviço',date:'2026-12-13',start:'08:30',end:'18:00',location:'Monte Córdova, Santo Tirso',           name:'Santa Luzia',                      secondBand:'',                                              value:0,notes:''},
];

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let events     = [];
let myCode     = localStorage.getItem('af_gc')     || '';
let myName     = localStorage.getItem('af_member') || '';
let groupData  = null;
let editingId  = null;
let currentTab = 'agenda';
let viewYear   = _td.getFullYear();
let viewMonth  = _td.getMonth();

/* ════════════════════════════════════════════
   PERSISTENCE (localStorage)
════════════════════════════════════════════ */
function loadEvents() {
  const raw = localStorage.getItem('af_events');
  events = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(SEED));
}
function saveEvents() {
  localStorage.setItem('af_events', JSON.stringify(events));
}

/* Groups stored per code */
function loadGroup(code) {
  const raw = localStorage.getItem('af_group_' + code);
  return raw ? JSON.parse(raw) : null;
}
function saveGroup(gd) {
  localStorage.setItem('af_group_' + gd.code, JSON.stringify(gd));
}

/* ════════════════════════════════════════════
   HELPERS
════════════════════════════════════════════ */
function uid()      { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function isoDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtD(s)    { return s ? s.split('-').reverse().join('/') : '—'; }
function dateStr(d) { return `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function bandInfo(n){ return BANDS.find(b => n && n.includes(b.short.split(' ')[0])) || BANDS[3]; }
function esc(s)     { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

/* ════════════════════════════════════════════
   RENDER
════════════════════════════════════════════ */
function render() {
  renderCalendar();
  renderStats();
  if (currentTab === 'next')   renderNext();
  if (currentTab === 'groups') renderGroups();
}

/* ── CALENDAR ── */
function renderCalendar() {
  document.getElementById('monthTitle').textContent  = MONTHS_PT[viewMonth];
  document.getElementById('yearDisplay').textContent = viewYear;

  document.getElementById('calHeader').innerHTML =
    DAYS_PT.map(d => `<div class="cal-day-label">${d}</div>`).join('');

  const first  = new Date(viewYear, viewMonth, 1);
  const offset = (first.getDay() + 6) % 7;
  const dim    = new Date(viewYear, viewMonth + 1, 0).getDate();
  let html = '';

  for (let i = 0; i < offset; i++) html += '<div class="cal-cell empty"></div>';

  for (let d = 1; d <= dim; d++) {
    const ds      = dateStr(d);
    const isToday = ds === todayStr;
    const dayEvs  = events.filter(e => e.date === ds);

    const chips = dayEvs.map(ev => {
      const bi = bandInfo(ev.band);
      return `<span class="cal-event" style="background:${bi.bg};color:${bi.fg}"
        onclick="event.stopPropagation();openEdit('${ev.id}')"
        title="${esc(ev.name||ev.type)}">${esc(ev.name||ev.type)}</span>`;
    }).join('');

    html += `<div class="cal-cell${isToday?' today':''}" onclick="openAdd('${ds}')">
      <span class="cal-num">${d}</span>${chips}
    </div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

/* ── GROUPS ── */
function renderGroups() {
  const gc = document.getElementById('groupsContent');

  if (!myCode) {
    gc.innerHTML = `<div class="card">
      <div class="card-title">👥 Calendário de grupo</div>
      <p style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:14px">
        Cria um grupo para a tua secção (ex: <em>Clarinetes</em>) e partilha o código com os colegas.
        Os dados do grupo ficam guardados localmente neste dispositivo.
      </p>
      <div class="setup-btns" id="setupBtns">
        <button class="btn btn-primary" onclick="showSetup('create')">＋ Criar grupo</button>
        <button class="btn btn-secondary" onclick="showSetup('join')">🔗 Entrar</button>
      </div>
      <div id="setupForm"></div>
    </div>`;
    return;
  }

  if (!groupData) groupData = loadGroup(myCode);
  if (!groupData) {
    gc.innerHTML = `<div class="card"><div class="empty-state"><div class="empty-icon">⚠️</div>Grupo não encontrado.<br><small>O grupo pode ter sido criado noutro dispositivo.<br>Os grupos partilhados requerem ligação a servidor.</small><br><br><button class="leave-btn" onclick="leaveGroup()">Sair</button></div></div>`;
    return;
  }

  const gservices = events.filter(e=>e.type==='Serviço').sort((a,b)=>a.date.localeCompare(b.date));

  let h = `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px">${esc(groupData.name||'Grupo')}</div>
        <div style="font-size:11px;color:var(--text2);margin-bottom:2px">👥 ${(groupData.members||[]).length} membros: ${(groupData.members||[]).map(esc).join(', ')}</div>
        <div style="font-size:11px;color:var(--text2)">A votar como: <strong style="color:var(--text)">${esc(myName)}</strong></div>
      </div>
    </div>
    <div class="code-display" onclick="copyCode()" title="Clica para copiar">${myCode}</div>
    <div class="copy-notice">Clica no código para copiar · Partilha com os colegas</div>
    <div class="group-tip" style="margin-top:8px">⚠️ Os votos são guardados neste dispositivo. Para votos partilhados em tempo real é necessário o modo Firebase.</div>
  </div>`;

  if (!gservices.length) {
    h += `<div class="empty-state"><div class="empty-icon">📋</div>Adiciona serviços na aba Agenda para votar aqui.</div>`;
  }

  gservices.forEach(ev => {
    const votes  = groupData.votes?.[ev.id] || {};
    const sim    = Object.values(votes).filter(v=>v==='sim').length;
    const nao    = Object.values(votes).filter(v=>v==='nao').length;
    const tal    = Object.values(votes).filter(v=>v==='talvez').length;
    const myV    = votes[myName];
    const isPast = ev.date < todayStr;
    const bi     = bandInfo(ev.band);

    const tags = Object.entries(votes).map(([m,v]) =>
      `<span class="member-tag" style="background:${v==='sim'?'var(--sbg)':v==='nao'?'var(--dbg)':'var(--wbg)'};color:${v==='sim'?'var(--success)':v==='nao'?'var(--danger)':'var(--warn)'}">${esc(m)}: ${v==='sim'?'vai':v==='nao'?'não vai':'talvez'}</span>`
    ).join('');

    h += `<div class="poll-card${isPast?' past':''}">
      <div class="poll-header">
        <span style="font-size:12px;font-weight:700;color:var(--text)">${esc(ev.name||'Evento')}</span>
        <span class="date-badge" style="background:${bi.bg};color:${bi.fg}">${fmtD(ev.date)}</span>
      </div>
      <div style="font-size:10px;color:var(--text2);margin-bottom:3px">${esc(ev.location)} · ${ev.start||'—'}${ev.end?' – '+ev.end:''}</div>
      <div class="tally">
        <span class="t-sim">✓ ${sim} vão</span>
        <span class="t-nao">✗ ${nao} não vão</span>
        <span class="t-tal">? ${tal} talvez</span>
      </div>
      ${!isPast?`<div class="vote-grid">
        <button class="vote-btn${myV==='sim'?' s-sim':''}" onclick="castVote('${ev.id}','sim')">✓ Vou</button>
        <button class="vote-btn${myV==='nao'?' s-nao':''}" onclick="castVote('${ev.id}','nao')">✗ Não vou</button>
        <button class="vote-btn${myV==='talvez'?' s-tal':''}" onclick="castVote('${ev.id}','talvez')">? Talvez</button>
      </div>`:`<div style="font-size:10px;color:var(--text3);font-style:italic">Evento passado</div>`}
      ${tags?`<div class="member-votes">${tags}</div>`:''}
    </div>`;
  });

  h += `<div style="text-align:center;padding:16px 0">
    <button class="leave-btn" onclick="leaveGroup()">Sair do grupo</button>
  </div>`;

  gc.innerHTML = h;
}

/* ════════════════════════════════════════════
   NAVIGATION
════════════════════════════════════════════ */
function prevMonth() {
  if (viewMonth===0){viewMonth=11;viewYear--;}else viewMonth--;
  renderCalendar(); renderStats();
}
function nextMonth() {
  if (viewMonth===11){viewMonth=0;viewYear++;}else viewMonth++;
  renderCalendar(); renderStats();
}
function setTab(tab) {
  currentTab = tab;
  ['agenda','next','groups'].forEach(t => {
    document.getElementById('tab-btn-'+t).classList.toggle('active', t===tab);
    document.getElementById('tab-'+t).style.display = t===tab?'':'none';
  });
  if (tab==='next')   renderNext();
  if (tab==='groups') renderGroups();
}

/* ════════════════════════════════════════════
   MODAL
════════════════════════════════════════════ */
function openAdd(date) {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Novo Evento';
  document.getElementById('btnDelete').style.display = 'none';
  clearForm();
  document.getElementById('fDate').value = date;
  document.getElementById('modal').style.display = 'flex';
}
function openEdit(id) {
  const ev = events.find(e=>e.id===id);
  if (!ev) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Editar Evento';
  document.getElementById('btnDelete').style.display = '';
  const known = BANDS.some(b=>b.name===ev.band);
  document.getElementById('fBand').value       = known ? ev.band : 'Outros';
  document.getElementById('fCustomBand').value = known ? '' : ev.band;
  document.getElementById('customBandField').style.display = known?'none':'';
  document.getElementById('fType').value       = ev.type;
  document.getElementById('fName').value       = ev.name||'';
  document.getElementById('fDate').value       = ev.date;
  document.getElementById('fStart').value      = ev.start||'';
  document.getElementById('fEnd').value        = ev.end||'';
  document.getElementById('fLocation').value   = ev.location||'';
  document.getElementById('fSecondBand').value = ev.secondBand||'';
  document.getElementById('fValue').value      = ev.value??0;
  document.getElementById('fNotes').value      = ev.notes||'';
  document.getElementById('modal').style.display = 'flex';
}
function clearForm() {
  document.getElementById('fBand').value       = BANDS[0].name;
  document.getElementById('fCustomBand').value = '';
  document.getElementById('customBandField').style.display = 'none';
  document.getElementById('fType').value       = 'Serviço';
  document.getElementById('fName').value       = '';
  document.getElementById('fStart').value      = '';
  document.getElementById('fEnd').value        = '';
  document.getElementById('fLocation').value   = '';
  document.getElementById('fSecondBand').value = '';
  document.getElementById('fValue').value      = '0';
  document.getElementById('fNotes').value      = '';
}
function closeModal() { document.getElementById('modal').style.display='none'; editingId=null; }
function overlayClick(e) { if(e.target.id==='modal') closeModal(); }
function handleBandChange() {
  document.getElementById('customBandField').style.display =
    document.getElementById('fBand').value==='Outros' ? '' : 'none';
}

/* ════════════════════════════════════════════
   SAVE / DELETE
════════════════════════════════════════════ */
function saveEvent() {
  let band = document.getElementById('fBand').value;
  if (band==='Outros') band = document.getElementById('fCustomBand').value.trim()||'Outros';
  const date = document.getElementById('fDate').value;
  if (!date) { alert('Por favor insere uma data.'); return; }

  const ev = {
    id:         editingId || uid(),
    band,
    type:       document.getElementById('fType').value,
    name:       document.getElementById('fName').value.trim(),
    date,
    start:      document.getElementById('fStart').value,
    end:        document.getElementById('fEnd').value,
    location:   document.getElementById('fLocation').value.trim(),
    secondBand: document.getElementById('fSecondBand').value.trim(),
    value:      Number(document.getElementById('fValue').value||0),
    notes:      document.getElementById('fNotes').value.trim(),
  };

  if (editingId) events = events.map(e=>e.id===editingId?ev:e);
  else events.push(ev);

  saveEvents();
  closeModal();
  render();
}
function deleteEvent() {
  if (!editingId) return;
  if (!confirm('Apagar este evento? Esta acção não pode ser desfeita.')) return;
  events = events.filter(e=>e.id!==editingId);
  saveEvents();
  closeModal();
  render();
}

/* ════════════════════════════════════════════
   GROUPS
════════════════════════════════════════════ */
function showSetup(mode) {
  document.getElementById('setupForm').innerHTML = mode==='create'
    ? `<div class="setup-panel">
        <div class="field"><label>O teu nome</label><input id="gMember" placeholder="Ex: João Silva"></div>
        <div class="field"><label>Nome do grupo</label><input id="gName" placeholder="Ex: Clarinetes"></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="createGroup()">＋ Criar</button>
          <button class="btn btn-secondary" onclick="cancelSetup()">Cancelar</button>
        </div>
      </div>`
    : `<div class="setup-panel">
        <div class="field"><label>O teu nome</label><input id="gMember" placeholder="Ex: João Silva"></div>
        <div class="field"><label>Código do grupo</label>
          <input id="gCode" placeholder="Ex: AB12CD" style="letter-spacing:3px;text-transform:uppercase;font-family:monospace;font-weight:700" oninput="this.value=this.value.toUpperCase()">
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="joinGroup()">🔗 Entrar</button>
          <button class="btn btn-secondary" onclick="cancelSetup()">Cancelar</button>
        </div>
      </div>`;
}
function cancelSetup() { document.getElementById('setupForm').innerHTML=''; }

function createGroup() {
  const name   = document.getElementById('gName')?.value?.trim();
  const member = document.getElementById('gMember')?.value?.trim();
  if (!name||!member) { alert('Preenche o teu nome e o nome do grupo.'); return; }
  const code = Math.random().toString(36).slice(2,8).toUpperCase();
  const gd   = { name, code, members:[member], votes:{} };
  saveGroup(gd);
  localStorage.setItem('af_gc', code);
  localStorage.setItem('af_member', member);
  myCode = code; myName = member; groupData = gd;
  renderGroups();
}

function joinGroup() {
  const code   = document.getElementById('gCode')?.value?.toUpperCase()?.trim();
  const member = document.getElementById('gMember')?.value?.trim();
  if (!code||!member) { alert('Preenche o teu nome e o código do grupo.'); return; }
  let gd = loadGroup(code);
  if (!gd) { alert('Grupo não encontrado neste dispositivo.\n\nNota: sem ligação a servidor, os grupos não são partilhados entre dispositivos.'); return; }
  if (!gd.members.includes(member)) { gd.members.push(member); saveGroup(gd); }
  localStorage.setItem('af_gc', code);
  localStorage.setItem('af_member', member);
  myCode = code; myName = member; groupData = gd;
  renderGroups();
}

function castVote(eventId, v) {
  if (!myCode||!myName||!groupData) return;
  if (!groupData.votes) groupData.votes = {};
  if (!groupData.votes[eventId]) groupData.votes[eventId] = {};
  groupData.votes[eventId][myName] = v;
  saveGroup(groupData);
  renderGroups();
}

function leaveGroup() {
  if (!confirm('Sair do grupo? Os dados do grupo ficam guardados neste dispositivo.')) return;
  localStorage.removeItem('af_gc');
  localStorage.removeItem('af_member');
  myCode=''; myName=''; groupData=null;
  renderGroups();
}

function copyCode() {
  if (!myCode) return;
  navigator.clipboard.writeText(myCode).then(()=>{
    const el = document.querySelector('.copy-notice');
    const prev = el.textContent;
    el.textContent = '✓ Código copiado!';
    setTimeout(()=>el.textContent=prev, 2000);
  }).catch(()=>{
    prompt('Copia o código:', myCode);
  });
}
